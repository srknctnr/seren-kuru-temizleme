function calcTx(t) {
  const items = t.items || [];
  const total = items.reduce((s,i) => s + (i.qty||0)*(i.unitPrice||0)*(1-(i.discount||0)/100), 0);
  const paid  = (t.payments||[]).reduce((s,p) => s + (p.amount||0), 0);
  return { total, paid, balance:total-paid, deliveredCount:items.filter(i=>i.delivered).length, itemsCount:items.length };
}

function getCustSummary(cid, txs) {
  let debt = 0, openCount = 0;
  txs.filter(t=>t.customerId===cid).forEach(t => {
    const {balance} = calcTx(t);
    if (balance > 0.01) debt += balance;
    if (t.status === "open") openCount++;
  });
  return { debt, openCount, total: txs.filter(t=>t.customerId===cid).length };
}

function gsUrlWithToken(token) {
  if (!token) return getGsUrl();
  return `${getGsUrl()}?token=${encodeURIComponent(token)}`;
}

async function gsRead(token) {
  const url = gsUrlWithToken(token);
  const sep = url.includes('?') ? '&' : '?';
  const r = await fetch(`${url}${sep}_t=${Date.now()}`);
  const txt = await r.text();
  const d = JSON.parse(txt || "{}");
  if (!r.ok) throw new Error("HTTP " + r.status);
  if (d && d.ok === false) throw new Error(d.error || "Yetkisiz");
  return d;
}

async function gsWrite(token, data) {
  const r = await fetch(gsUrlWithToken(token), { method:"POST", body:JSON.stringify(data) });
  const txt = await r.text();
  const d = JSON.parse(txt || "{}");
  if (!r.ok) throw new Error("HTTP " + r.status);
  if (d && d.ok === false) throw new Error(d.error || "Kaydetme hatası");
  return d;
}

async function gsLogin(phone, password) {
  const r = await fetch(getGsUrl(), {
    method: "POST",
    body: JSON.stringify({ action: "login", phone, password })
  });
  const txt = await r.text();
  const d = JSON.parse(txt || "{}");
  if (!r.ok || (d && d.ok === false)) throw new Error(d?.error || "Giriş başarısız");
  return d; // {ok:true, token, role, phone, fullName}
}

function exportCustomersXLSX(cx) {
  const rows = [["Ad Soyad","Telefon","Adres"]];
  [...cx].sort((a,b)=>a.name.localeCompare(b.name,"tr")).forEach(c => {
    rows.push([c.name||"", c.phone||"", c.address||""]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{wch:30},{wch:20},{wch:40}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Müşteriler");
  XLSX.writeFile(wb, `seren-musteriler-${today()}.xlsx`);
}

function exportJSON(cx,tx,cb,cfg) {
  const blob = new Blob([JSON.stringify({version:3,exportedAt:new Date().toISOString(),cx,tx,cb,cfg},null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `seren-yedek-${today()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}

// Eski cfg formatını yeni formata dönüştür
function migrateCfg(cfg) {
  if (!cfg) return { svc:DEFAULT_SVC, users:DEFAULT_USERS };
  const svc = (cfg.svc && cfg.svc[0] && Array.isArray(cfg.svc[0].items)) ? cfg.svc : DEFAULT_SVC;
  const users = (cfg.users && cfg.users.length > 0) ? cfg.users : DEFAULT_USERS;
  return { ...cfg, svc, users };
}

function Login({ onLogin }) {
  const [phone, setPhone] = useState("");
  const [password, setPassword] = useState("");
  const [err,      setErr]      = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    const p = phone.trim();
    const pw = password;
    if (!p) { setErr("Telefon gerekli."); return; }
    if (!pw || pw.length < 4) { setErr("Şifre hatalı."); return; }
    setBusy(true);
    setErr("");
    try {
      const d = await gsLogin(p, pw);
      const role = d.role || d.userRole || "STAFF";
      const fullName = d.fullName || d.name || p;
      onLogin({
        token: d.token,
        user: { id: d.phone || p, name: fullName, role }
      });
    } catch (e) {
      setErr(e instanceof Error ? e.message : "Giriş başarısız");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <style>{CSS}</style>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:52,marginBottom:10}}>👔</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",color:C.p,fontSize:24,marginBottom:6}}>Seren Kuru Temizleme</h1>
          <p style={{color:C.m,fontSize:14}}>Sisteme giriş yapın</p>
        </div>
        <div style={{background:C.s,borderRadius:16,padding:28,boxShadow:"0 4px 24px rgba(27,58,92,0.12)",border:`1px solid ${C.b}`}}>
          <Field label="Telefon">
            <input
              value={phone}
              onChange={e=>{setPhone(e.target.value);setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder="5318221952"
              inputMode="tel"
              autoComplete="tel"
            />
          </Field>
          <Field label="Şifre">
            <div style={{position:"relative"}}>
              <input type={showPw?"text":"password"} value={password}
                onChange={e=>{setPassword(e.target.value);setErr("");}}
                onKeyDown={e=>e.key==="Enter"&&submit()}
                placeholder="Şifreniz" autoComplete="current-password"
                style={{paddingRight:44}}/>
              <button onClick={()=>setShowPw(v=>!v)}
                style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.m,fontSize:16,padding:4}}>
                {showPw?"🙈":"👁"}
              </button>
            </div>
          </Field>
          {err && <div style={{background:C.errb,color:C.err,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:600,marginBottom:14}}>{err}</div>}
          <Btn onClick={submit} variant="accent" size="lg" style={{width:"100%",justifyContent:"center",marginTop:4}} disabled={busy}>
            🔐 Giriş Yap
          </Btn>
        </div>
      </div>
    </div>
  );
}

function Btn({ onClick, children, variant="primary", size="md", style:sx={}, disabled=false }) {
  const bg  = {primary:C.p,accent:C.a,success:C.ok,danger:C.err,ghost:"transparent",wa:"#25D366"}[variant]||C.p;
  const col = {primary:"#fff",accent:"#fff",success:"#fff",danger:"#fff",ghost:C.p,wa:"#fff"}[variant]||"#fff";
  const brd = variant==="ghost" ? `1.5px solid ${C.b}` : "none";
  const pad = {sm:"5px 10px",md:"8px 16px",lg:"10px 22px"}[size]||"8px 16px";
  return (
    <button onClick={onClick} disabled={disabled}
      style={{background:bg,color:col,border:brd,padding:pad,borderRadius:8,fontWeight:700,
        fontSize:size==="sm"?12:14,display:"inline-flex",alignItems:"center",gap:5,opacity:disabled?0.5:1,...sx}}>
      {children}
    </button>
  );
}

function App() {
  const [view, setView]  = useState("home");
  const [pg,   setPg]    = useState({});
  const [cx,   setCx]    = useState([]);
  const [tx,   setTx]    = useState([]);
  const [cb,   setCb]    = useState([]);
  const [cfg,  setCfg]   = useState({ svc: DEFAULT_SVC });
  const [sync, setSync]  = useState("idle");
  const [ready,setReady] = useState(false);
  const [authUser, setAuthUser] = useState(() => SS.get("authUser"));
  const [token, setToken] = useState(() => SS.get("token"));
  const timer = useRef(null);

  useEffect(() => {
    if (!token) {
      setReady(true);
      setSync("idle");
      return;
    }

    setSync("saving");
    gsRead(token)
      .then(d => {
        const gsCx   = d.cx  || [];
        const localCx = LC.get("cx") || [];
        // GS yazma başarısız olmuşsa localStorage daha fazla müşteri içerebilir → onu koru
        const useCx = localCx.length > gsCx.length ? localCx : gsCx;
        setCx(useCx);
        if (d.tx) setTx(d.tx);
        if (d.cb) setCb(d.cb);
        if (typeof d.cfg !== "undefined") setCfg(migrateCfg(d.cfg));
        LC.set("cx",useCx); LC.set("tx",d.tx||[]); LC.set("cb",d.cb||[]); LC.set("cfg",d.cfg);
        // Yerel veri GS'den fazlaysa arka planda tekrar senkronize etmeyi dene
        if (useCx.length > gsCx.length) {
          gsWrite(token, {cx:useCx, tx:d.tx||[], cb:d.cb||[], cfg:d.cfg}).catch(()=>{});
        }
        setSync("ok");
      })
      .catch(() => {
        // Yetkisiz / token bozuksa login ekranına dön
        SS.del("token");
        SS.del("authUser");
        setToken(null);
        setAuthUser(null);
        setSync("error");
      })
      .finally(() => setReady(true));
  }, [token]);

  const saveAll = useCallback((ncx,ntx,ncb,ncfg) => {
    clearTimeout(timer.current);
    setSync("saving");
    LC.set("cx",ncx); LC.set("tx",ntx); LC.set("cb",ncb); LC.set("cfg",ncfg);
    timer.current = setTimeout(() => {
      gsWrite(token,{cx:ncx,tx:ntx,cb:ncb,cfg:ncfg})
        .then(()=>setSync("ok"))
        .catch(()=>setSync("error"))
        .finally(()=>setTimeout(()=>setSync("idle"),3000));
    }, 800);
  }, [token]);

  const uCx  = d => { setCx(d);  saveAll(d, tx, cb, cfg); };
  const uTx  = d => { setTx(d);  saveAll(cx, d, cb, cfg); };
  const uCb  = d => { setCb(d);  saveAll(cx, tx, d, cfg); };

  // Excel import için debounce'suz, anında GS'ye yazan fonksiyon
  const importCx = useCallback(async (newCxData) => {
    setCx(newCxData);
    clearTimeout(timer.current);
    setSync("saving");
    LC.set("cx", newCxData); LC.set("tx", tx); LC.set("cb", cb); LC.set("cfg", cfg);
    try {
      await gsWrite(token, {cx:newCxData, tx, cb, cfg});
      setSync("ok");
      setTimeout(() => setSync("idle"), 3000);
      return {ok:true};
    } catch(e) {
      setSync("error");
      setTimeout(() => setSync("idle"), 3000);
      return {ok:false, localOnly:true, error: e instanceof Error ? e.message : String(e)};
    }
  }, [token, tx, cb, cfg]);
  const uCfg = d => {
    const r = authUser?.role || "";
    const isAdmin = String(r).toUpperCase() === "ADMIN" || String(r).toLowerCase() === "admin";
    if (!isAdmin) { alert("Hizmet/fiyat düzenlemek için ADMIN yetkisi gerekir."); return; }
    setCfg(d);
    saveAll(cx, tx, cb, d);
  };
  const nav  = (v, params={}) => { setView(v); setPg(params); window.scrollTo(0,0); };

  const onExport = () => exportJSON(cx,tx,cb,cfg);
  const onImport = file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (!d.cx||!d.tx) { alert("Geçersiz yedek."); return; }
        if (!window.confirm("Mevcut veriler silinip yedek yüklenecek. Devam?")) return;
        uCx(d.cx||[]); uTx(d.tx||[]); uCb(d.cb||[]);
        if (d.cfg) uCfg(d.cfg);
        alert("✅ Yedek yüklendi!");
      } catch { alert("Dosya okunamadı."); }
    };
    reader.readAsText(file);
  };

  if (!ready) return <Spinner msg="Google Sheets'ten veriler yükleniyor…" />;

  const handleLogin = payload => {
    const t = payload?.token || null;
    const u = payload?.user || null;
    if (t) SS.set("token", t);
    if (u) SS.set("authUser", u);
    setToken(t);
    setAuthUser(u);
  };
  const handleLogout = () => {
    SS.del("token");
    SS.del("authUser");
    setToken(null);
    setAuthUser(null);
    setView("home");
  };

  // Giriş yapılmamışsa Login ekranı göster
  if (!token || !authUser) return <Login onLogin={handleLogin} />;

  const liveUser = authUser;

  const ctx = { cx, tx, cb, cfg, nav, pg, uCx, uTx, uCb, uCfg, onExport, onImport, importCx, sync, authUser:liveUser, onLogout:handleLogout };
  const views = { home:Home, clist:CList, cform:CForm, cdetail:CDetail, newtx:NewTx, txdetail:TxDetail, cash:Cash, reports:Reports, settings:Settings };
  const View = views[view] || Home;

  return (
    <div style={{fontFamily:"'Nunito',sans-serif",background:C.bg,minHeight:"100vh",color:C.t}}>
      <style>{CSS}</style>
      <Nav view={view} nav={nav} syncStatus={sync} authUser={liveUser} onLogout={handleLogout} />
      <div style={{maxWidth:960,margin:"0 auto",padding:"72px 14px 60px"}}>
        <View {...ctx} />
      </div>
    </div>
  );
}

// ── CUSTOMER LIST ─────────────────────────────────────────────────────────────
function CList({ cx, tx, nav, uCx, importCx }) {
  const [q, setQ] = useState("");
  const [importResult, setImportResult] = useState(null);
  const fileRef = useRef(null);

  const filtered = cx.filter(c=>!q||c.name.toLowerCase().includes(q.toLowerCase())||c.phone.includes(q));

  const handleImport = e => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
        const getField = (row, ...keys) => {
          for (const k of keys) {
            const found = Object.keys(row).find(rk=>rk.trim().toLowerCase()===k.toLowerCase());
            if (found) return String(row[found]).trim();
          }
          return "";
        };
        const existingPhones = new Set(cx.map(c=>c.phone.replace(/\s/g,"")));
        let skipped = 0;
        const newCustomers = [];
        rows.forEach(row => {
          const name    = getField(row,"ad soyad","name","isim","ad");
          const phone   = getField(row,"telefon","phone","tel");
          const address = getField(row,"adres","address");
          if (!name || !phone) { skipped++; return; }
          if (existingPhones.has(phone.replace(/\s/g,""))) { skipped++; return; }
          existingPhones.add(phone.replace(/\s/g,""));
          newCustomers.push({id:uid(), createdAt:new Date().toISOString(), name, phone, address});
        });
        if (newCustomers.length === 0) {
          setImportResult({added:0, skipped, ok:true});
          return;
        }
        const CHUNK = 200;
        const totalChunks = Math.ceil(newCustomers.length / CHUNK);
        let gsSaved = 0;
        let currentCx = [...cx];
        for (let i = 0; i < newCustomers.length; i += CHUNK) {
          const chunk = newCustomers.slice(i, i + CHUNK);
          currentCx = [...currentCx, ...chunk];
          const chunkIdx = Math.floor(i / CHUNK) + 1;
          setImportResult({added:newCustomers.length, gsSaved, savingChunk:chunkIdx, totalChunks, skipped, saving:true});
          const result = await importCx(currentCx);
          if (!result.ok) {
            setImportResult({
              added:newCustomers.length, gsSaved, skipped,
              partial: gsSaved > 0,
              localOnly:true,
              error: gsSaved > 0
                ? `${gsSaved} müşteri Google Sheets'e kaydedildi, kalan ${newCustomers.length - gsSaved} müşteri yalnızca bu tarayıcıda.`
                : result.error
            });
            return;
          }
          gsSaved += chunk.length;
        }
        setImportResult({added:newCustomers.length, gsSaved, skipped, ok:true});
      } catch(err) {
        setImportResult({readError: err instanceof Error ? err.message : String(err)});
      }
    };
    reader.readAsArrayBuffer(file);
  };

  return (
    <div className="fin">
      <input ref={fileRef} type="file" accept=".xlsx,.csv" style={{display:"none"}} onChange={handleImport}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",color:C.p,fontSize:20}}>Müşteriler ({cx.length})</h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn onClick={()=>exportCustomersXLSX(cx)} variant="ghost" size="sm">⬇ Excel'e Aktar</Btn>
          <Btn onClick={()=>fileRef.current&&fileRef.current.click()} variant="ghost" size="sm">⬆ Excel'den Yükle</Btn>
          <Btn onClick={()=>nav("cform")} variant="accent">+ Yeni Müşteri</Btn>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Ad veya telefon ile filtrele…"/>
      </div>
      <Card>
        {filtered.length===0 ? <Empty/> : filtered.sort((a,b)=>a.name.localeCompare(b.name,"tr")).map(c => {
          const {debt,openCount} = getCustSummary(c.id,tx);
          return (
            <div key={c.id} className="hrow" onClick={()=>nav("cdetail",{cid:c.id})}
              style={{padding:"12px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,marginBottom:2}}>{c.name}</div>
                <div style={{color:C.m,fontSize:12}}>📞 {c.phone}{c.address?` • ${c.address}`:""}</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {openCount>0 && <Badge color="warn">{openCount} açık</Badge>}
                {debt>0.01   && <Badge color="danger">{fmt(debt)}</Badge>}
                <span style={{color:C.m,fontSize:18}}>›</span>
              </div>
            </div>
          );
        })}
      </Card>
      <Modal open={!!importResult} onClose={()=>!importResult?.saving && setImportResult(null)} title="Excel İçe Aktarma">
        {importResult && (
          importResult.readError
            ? <p style={{color:C.err,fontSize:13}}>❌ Dosya okunamadı: {importResult.readError}</p>
            : <div>
                {importResult.saving
                  ? <div>
                      <p style={{color:C.m,fontSize:14,marginBottom:8}}>⏳ Google Sheets'e kaydediliyor… (parça {importResult.savingChunk}/{importResult.totalChunks})</p>
                      <div style={{background:"#e8e8e8",borderRadius:6,height:8,overflow:"hidden"}}>
                        <div style={{background:C.p,height:"100%",width:`${((importResult.gsSaved||0)/importResult.added)*100}%`,transition:"width 0.3s",borderRadius:6}}/>
                      </div>
                      <p style={{color:C.m,fontSize:12,marginTop:6}}>{importResult.gsSaved||0} / {importResult.added} müşteri kaydedildi</p>
                    </div>
                  : <>
                      <p style={{color:C.ok,fontWeight:700,marginBottom:8}}>✅ {importResult.added} yeni müşteri eklendi.</p>
                      {importResult.skipped>0 && <p style={{color:C.m,fontSize:13,marginBottom:8}}>{importResult.skipped} kayıt atlandı (telefon zaten mevcut veya eksik bilgi).</p>}
                      {importResult.added>0 && (importResult.ok
                        ? <p style={{color:C.ok,fontSize:13}}>☁ Tüm müşteriler Google Sheets'e kaydedildi.</p>
                        : <div style={{background:C.warnb,borderRadius:8,padding:"10px 12px",marginTop:4,border:`1px solid ${C.warn}`}}>
                            {importResult.partial
                              ? <p style={{color:C.warn,fontSize:13,fontWeight:700,marginBottom:4}}>⚠ Kısmen kaydedildi</p>
                              : <p style={{color:C.warn,fontSize:13,fontWeight:700,marginBottom:4}}>⚠ Google Sheets'e yazılamadı</p>
                            }
                            {importResult.error && <p style={{color:C.t,fontSize:12,marginBottom:8}}>{importResult.error}</p>}
                            {importResult.localOnly && <p style={{color:C.ok,fontSize:12,fontWeight:700}}>✅ Tüm müşteriler bu tarayıcıda kaydedildi — sayfa yenilemede kaybolmayacak.</p>}
                          </div>
                      )}
                    </>
                }
              </div>
        )}
        {!importResult?.saving && <Btn onClick={()=>setImportResult(null)} variant="primary" style={{marginTop:16,width:"100%",justifyContent:"center"}}>Tamam</Btn>}
      </Modal>
    </div>
  );
}

// ── CUSTOMER FORM ─────────────────────────────────────────────────────────────
function CForm({ cx, nav, pg, uCx }) {
  const editing = pg.cid ? cx.find(c=>c.id===pg.cid) : null;
  const [form, setForm] = useState({name:(editing && editing.name)||"",phone:(editing && editing.phone)||"",address:(editing && editing.address)||""});
  const [delModal, setDelModal] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const save = () => {
    if (!form.name.trim()||!form.phone.trim()) { alert("Ad ve telefon zorunludur."); return; }
    if (editing) uCx(cx.map(c=>c.id===editing.id?{...c,...form}:c));
    else         uCx([...cx,{id:uid(),createdAt:new Date().toISOString(),...form}]);
    nav("clist");
  };
  return (
    <div className="fin" style={{maxWidth:480}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <Btn onClick={()=>nav("clist")} variant="ghost" size="sm">← Geri</Btn>
        <h2 style={{fontFamily:"'Playfair Display',serif",color:C.p,fontSize:20}}>{editing?"Müşteri Düzenle":"Yeni Müşteri"}</h2>
      </div>
      <Card>
        <div style={{padding:20}}>
          <Field label="Ad Soyad *"><input value={form.name}    onChange={e=>set("name",e.target.value)}    placeholder="Ahmet Yılmaz"/></Field>
          <Field label="Telefon *"> <input value={form.phone}   onChange={e=>set("phone",e.target.value)}   placeholder="0555 555 55 55"/></Field>
          <Field label="Adres">     <textarea value={form.address} onChange={e=>set("address",e.target.value)} placeholder="Mahalle, sokak, ilçe…" rows={2} style={{resize:"vertical"}}/></Field>
          <Btn onClick={save} variant="accent" size="lg" style={{width:"100%",justifyContent:"center",marginBottom:editing?10:0}}>{editing?"Güncelle":"Müşteriyi Kaydet"}</Btn>
          {editing && <Btn onClick={()=>setDelModal(true)} variant="danger" size="sm" style={{width:"100%",justifyContent:"center"}}>🗑 Müşteriyi Sil</Btn>}
        </div>
      </Card>
      <Modal open={delModal} onClose={()=>setDelModal(false)} title="Müşteriyi Sil">
        <p style={{color:C.m,fontSize:14,marginBottom:18}}>Bu müşteriyi silmek istiyor musunuz?</p>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{uCx(cx.filter(c=>c.id!==editing.id));nav("clist");}} variant="danger" style={{flex:1,justifyContent:"center"}}>Evet, Sil</Btn>
          <Btn onClick={()=>setDelModal(false)} variant="ghost" style={{flex:1,justifyContent:"center"}}>İptal</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ── SETTINGS USERS ────────────────────────────────────────────────────────────
function SettingsUsers({ users, authUser, uUsers, onLogout }) {
  const isAdmin = (authUser && authUser.role) === "admin";
  const [newUser, setNewUser] = useState({name:"",username:"",password:"",role:"user"});
  const [editUser, setEditUser] = useState(null);
  const [pwModal, setPwModal] = useState(false);
  const [pw, setPw] = useState({old:"",n1:"",n2:""});
  const [pwErr, setPwErr] = useState("");

  const addUser = () => {
    if (!newUser.name.trim()||!newUser.username.trim()||!newUser.password.trim()) { alert("Ad, kullanıcı adı ve şifre zorunludur."); return; }
    if (users.find(u=>u.username===newUser.username.trim())) { alert("Bu kullanıcı adı zaten kullanılıyor."); return; }
    uUsers([...users,{id:uid(),...newUser,name:newUser.name.trim(),username:newUser.username.trim(),password:newUser.password.trim(),active:true}]);
    setNewUser({name:"",username:"",password:"",role:"user"});
  };

  const toggleActive = u => {
    if (u.id===authUser.id) { alert("Kendinizi devre dışı bırakamazsınız."); return; }
    uUsers(users.map(x=>x.id!==u.id?x:{...x,active:!x.active}));
  };

  const delUser = u => {
    if (u.id===authUser.id) { alert("Kendinizi silemezsiniz."); return; }
    if (!window.confirm(`"${u.name}" kullanıcısını silmek istiyor musunuz?`)) return;
    uUsers(users.filter(x=>x.id!==u.id));
  };

  const changePw = () => {
    setPwErr("");
    if (!pw.old||!pw.n1||!pw.n2) { setPwErr("Tüm alanları doldurun."); return; }
    const me = users.find(u=>u.id===authUser.id);
    if (me.password !== pw.old) { setPwErr("Mevcut şifre hatalı."); return; }
    if (pw.n1 !== pw.n2) { setPwErr("Yeni şifreler eşleşmiyor."); return; }
    if (pw.n1.length < 4) { setPwErr("Şifre en az 4 karakter olmalı."); return; }
    uUsers(users.map(u=>u.id===authUser.id?{...u,password:pw.n1}:u));
    setPwModal(false); setPw({old:"",n1:"",n2:""}); alert("✅ Şifre güncellendi. Lütfen tekrar giriş yapın.");
    onLogout();
  };

  const saveEditUser = () => {
    if (!editUser.name.trim()||!editUser.username.trim()) { alert("Ad ve kullanıcı adı zorunludur."); return; }
    const conflict = users.find(u=>u.username===editUser.username.trim()&&u.id!==editUser.id);
    if (conflict) { alert("Bu kullanıcı adı zaten kullanılıyor."); return; }
    uUsers(users.map(u=>u.id!==editUser.id?u:{...u,name:editUser.name.trim(),username:editUser.username.trim(),role:editUser.role,...(editUser.newPw?{password:editUser.newPw}:{})}));
    setEditUser(null);
  };

  return (
    <div>
      {/* Şifremi Değiştir */}
      <div style={{background:"#E8EFF7",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontWeight:700,color:C.p}}>👤 {(authUser && authUser.name)}</div>
          <div style={{color:C.m,fontSize:12}}>@{(authUser && authUser.username)} · {(authUser && authUser.role)==="admin"?"Yönetici":"Kullanıcı"}</div>
        </div>
        <Btn onClick={()=>setPwModal(true)} variant="ghost" size="sm">🔑 Şifremi Değiştir</Btn>
      </div>

      {/* Kullanıcı Listesi — sadece admin */}
      {isAdmin && (
        <Card title="Kullanıcı Yönetimi">
          {users.map(u=>(
            <div key={u.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontWeight:700}}>{u.name}</span>
                  <Badge color={u.role==="admin"?"warn":"primary"}>{u.role==="admin"?"Yönetici":"Kullanıcı"}</Badge>
                  {u.active===false&&<Badge color="danger">Devre Dışı</Badge>}
                  {u.id===authUser.id&&<Badge color="success">Siz</Badge>}
                </div>
                <div style={{color:C.m,fontSize:12,marginTop:2}}>@{u.username}</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <Btn onClick={()=>setEditUser({...u,newPw:""})} variant="ghost" size="sm">✏️</Btn>
                <Btn onClick={()=>toggleActive(u)} variant={u.active===false?"success":"ghost"} size="sm">{u.active===false?"✅ Aç":"⏸ Kapat"}</Btn>
                {u.id!==authUser.id&&<Btn onClick={()=>delUser(u)} variant="danger" size="sm">🗑</Btn>}
              </div>
            </div>
          ))}
          {/* Yeni kullanıcı */}
          <div style={{padding:16}}>
            <div style={{fontWeight:700,color:C.p,fontSize:13,marginBottom:10}}>+ Yeni Kullanıcı</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <input value={newUser.name}     onChange={e=>setNewUser(f=>({...f,name:e.target.value}))}     placeholder="Ad Soyad"/>
              <input value={newUser.username} onChange={e=>setNewUser(f=>({...f,username:e.target.value}))} placeholder="Kullanıcı adı"/>
              <input value={newUser.password} onChange={e=>setNewUser(f=>({...f,password:e.target.value}))} placeholder="Şifre" type="password"/>
              <select value={newUser.role} onChange={e=>setNewUser(f=>({...f,role:e.target.value}))}>
                <option value="user">Kullanıcı</option>
                <option value="admin">Yönetici</option>
              </select>
            </div>
            <Btn onClick={addUser} variant="success" style={{width:"100%",justifyContent:"center"}}>+ Kullanıcı Ekle</Btn>
          </div>
        </Card>
      )}

      {/* Şifre değiştirme modal */}
      <Modal open={pwModal} onClose={()=>{setPwModal(false);setPwErr("");setPw({old:"",n1:"",n2:""})}} title="Şifremi Değiştir">
        <Field label="Mevcut Şifre">  <input type="password" value={pw.old} onChange={e=>setPw(p=>({...p,old:e.target.value}))} placeholder="Mevcut şifreniz"/></Field>
        <Field label="Yeni Şifre">    <input type="password" value={pw.n1}  onChange={e=>setPw(p=>({...p,n1:e.target.value}))}  placeholder="Yeni şifre (en az 4 karakter)"/></Field>
        <Field label="Yeni Şifre (Tekrar)"><input type="password" value={pw.n2} onChange={e=>setPw(p=>({...p,n2:e.target.value}))} placeholder="Yeni şifre tekrar"/></Field>
        {pwErr && <div style={{background:C.errb,color:C.err,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:600,marginBottom:12}}>{pwErr}</div>}
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={changePw} variant="accent" style={{flex:1,justifyContent:"center"}}>Şifreyi Güncelle</Btn>
          <Btn onClick={()=>{setPwModal(false);setPwErr("");}} variant="ghost" style={{flex:1,justifyContent:"center"}}>İptal</Btn>
        </div>
      </Modal>

      {/* Kullanıcı düzenleme modal */}
      <Modal open={!!editUser} onClose={()=>setEditUser(null)} title="Kullanıcıyı Düzenle">
        {editUser && <>
          <Field label="Ad Soyad">         <input value={editUser.name}     onChange={e=>setEditUser(u=>({...u,name:e.target.value}))}     placeholder="Ad Soyad"/></Field>
          <Field label="Kullanıcı Adı">   <input value={editUser.username} onChange={e=>setEditUser(u=>({...u,username:e.target.value}))} placeholder="Kullanıcı adı"/></Field>
          <Field label="Yetki">
            <select value={editUser.role} onChange={e=>setEditUser(u=>({...u,role:e.target.value}))}>
              <option value="user">Kullanıcı</option>
              <option value="admin">Yönetici</option>
            </select>
          </Field>
          <Field label="Yeni Şifre (boş bırakırsanız değişmez)">
            <input type="password" value={editUser.newPw||""} onChange={e=>setEditUser(u=>({...u,newPw:e.target.value}))} placeholder="Yeni şifre (opsiyonel)"/>
          </Field>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={saveEditUser} variant="accent" style={{flex:1,justifyContent:"center"}}>Kaydet</Btn>
            <Btn onClick={()=>setEditUser(null)} variant="ghost" style={{flex:1,justifyContent:"center"}}>İptal</Btn>
          </div>
        </>}
      </Modal>
    </div>
  );
}

          <div style={{background:"rgba(42,125,90,0.35)",borderRadius:8,padding:"8px 14px"}}>

          </div>
          <div style={{background:debt>0.01?"rgba(176,48,37,0.4)":"rgba(42,125,90,0.35)",borderRadius:8,padding:"8px 14px"}}>

        {[["open","Açık İşlemler"],["all","Tüm İşlemler"],["payments","Ödemeler"]].map(([k,l]) => (

}

// ── NEW TRANSACTION ───────────────────────────────────────────────────────────
function NewTx({ cx, tx, cfg, nav, pg, uTx }) {
  const cust = cx.find(c=>c.id===pg.cid);
  const firstSvc = cfg.svc[0];

  const newItem = (svc) => {
    const s = svc || firstSvc || {};
    const firstPrd = (s.items||[])[0] || {};
    return {
      id:uid(),
      svcId:s.id||"", svcName:s.name||"",
      prdId:firstPrd.id||"", prdName:firstPrd.name||"",
      unitPrice:firstPrd.price||0,
      qty:1, discount:0,
      delivered:false, deliveredAt:null, note:""
    };
  };

  const [items,     setItems]  = useState([newItem()]);
  const [readyDate, setRD]     = useState("");
  const [notes,     setNotes]  = useState("");

  if (!cust) return <div><Btn onClick={()=>nav("home")} variant="ghost">← Geri</Btn><Empty msg="Müşteri bulunamadı"/></div>;

  // Hizmet seçildiğinde: svcId/svcName güncelle, ürün listesini sıfırla
  const selectSvc = (idx, svcId) => {
    const svc = cfg.svc.find(s=>s.id===svcId);
    const firstPrd = ((svc && svc.items)||[])[0] || {};
    setItems(arr => arr.map((it,i) => i!==idx ? it : {
      ...it,
      svcId, svcName:(svc && svc.name)||"",
      prdId:firstPrd.id||"", prdName:firstPrd.name||"",
      unitPrice:firstPrd.price||0,
    }));
  };

  // Ürün seçildiğinde: sadece o hizmetin ürünleri arasından seç
  const selectPrd = (idx, prdId) => {
    const svc = cfg.svc.find(s=>s.id===items[idx].svcId);
    const prd = ((svc && svc.items)||[]).find(p=>p.id===prdId);
    setItems(arr => arr.map((it,i) => i!==idx ? it : {
      ...it,
      prdId, prdName:(prd && prd.name)||"", unitPrice:(prd && prd.price)||0
    }));
  };

  const setItem = (idx,key,val) => setItems(arr=>arr.map((it,i)=>i!==idx?it:{...it,[key]:val}));

  const lineTotal  = it => (it.qty||0)*(it.unitPrice||0)*(1-(it.discount||0)/100);
  const grandTotal = items.reduce((s,it)=>s+lineTotal(it),0);

  const save = () => {
    if (!items.length) { alert("En az 1 ürün ekleyin."); return; }
    if (items.some(it=>!it.prdName.trim())) { alert("Her satır için ürün seçiniz."); return; }
    const newTx = {id:uid(),customerId:cust.id,createdAt:new Date().toISOString(),status:"open",items,payments:[],readyDate,notes};
    uTx([...tx,newTx]);
    nav("txdetail",{txId:newTx.id});
  };

  return (
    <div className="fin">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <Btn onClick={()=>nav("cdetail",{cid:cust.id})} variant="ghost" size="sm">← Geri</Btn>
        <h2 style={{fontFamily:"'Playfair Display',serif",color:C.p,fontSize:20}}>Yeni İşlem</h2>
      </div>

      <div style={{background:"#E8EFF7",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>👤</span>
        <div>
          <div style={{fontWeight:700,color:C.p}}>{cust.name}</div>
          <div style={{color:C.m,fontSize:12}}>{cust.phone}</div>
        </div>
      </div>

      <Card title="Ürünler" action={<Btn onClick={()=>setItems(a=>[...a,newItem()])} variant="success" size="sm">+ Satır Ekle</Btn>}>
        {items.map((it,idx) => {
          const svc = cfg.svc.find(s=>s.id===it.svcId);
          const svcItems = (svc && svc.items) || [];
          return (
            <div key={it.id} style={{padding:"16px",borderBottom:`1px solid ${C.b}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                <span style={{fontWeight:700,fontSize:13,color:C.p}}>Satır {idx+1}</span>
                {items.length>1 && <Btn onClick={()=>setItems(a=>a.filter((_,j)=>j!==idx))} variant="danger" size="sm">✕ Çıkar</Btn>}
              </div>

              {/* 1. Hizmet Türü */}
              <Field label="Hizmet Türü">
                <select value={it.svcId} onChange={e=>selectSvc(idx,e.target.value)}>
                  {cfg.svc.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              </Field>

              {/* 2. Ürün — sadece seçili hizmetin ürünleri */}
              <Field label="Ürün">
                <select value={it.prdId} onChange={e=>selectPrd(idx,e.target.value)}>
                  <option value="">— Ürün Seçin —</option>
                  {svcItems.map(p=><option key={p.id} value={p.id}>{p.name} — {fmt(p.price)}</option>)}
                </select>
              </Field>

              {/* Ürün adı manuel düzenleme */}
              <Field label="Ürün Adı (düzenleyebilirsiniz)">
                <input value={it.prdName} onChange={e=>setItem(idx,"prdName",e.target.value)} placeholder="Ürün adı…"/>
              </Field>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
                <Field label="Adet">
                  <input type="number" min="1" value={it.qty} onChange={e=>setItem(idx,"qty",Math.max(1,parseInt(e.target.value)||1))}/>
                </Field>
                <Field label="Birim Fiyat ₺">
                  <input type="number" min="0" step="0.01" value={it.unitPrice} onChange={e=>setItem(idx,"unitPrice",parseFloat(e.target.value)||0)}/>
                </Field>
                <Field label="İndirim %">
                  <input type="number" min="0" max="100" value={it.discount} onChange={e=>setItem(idx,"discount",Math.min(100,parseFloat(e.target.value)||0))}/>
                </Field>
                <Field label="Tutar">
                  <div style={{padding:"9px 12px",background:"#F0EBE3",borderRadius:8,fontWeight:700,color:C.p}}>{fmt(lineTotal(it))}</div>
                </Field>
              </div>

              <Field label="Not">
                <input value={it.note||""} onChange={e=>setItem(idx,"note",e.target.value)} placeholder="Leke, özel durum vb."/>
              </Field>
            </div>
          );
        })}
        <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#FAFAF8"}}>
          <span style={{fontWeight:700,color:C.p}}>Genel Toplam</span>
          <span style={{fontWeight:800,fontSize:20,color:C.a}}>{fmt(grandTotal)}</span>
        </div>
      </Card>

      <Card title="Ek Bilgiler">
        <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Hazır Olma Tarihi"><input type="date" value={readyDate} onChange={e=>setRD(e.target.value)} min={today()}/></Field>
          <Field label="Genel Not"><input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Müşteriye özel not…"/></Field>
        </div>
      </Card>

      <Btn onClick={save} variant="accent" size="lg" style={{width:"100%",justifyContent:"center",fontSize:15}}>
        💾 İşlemi Kaydet ({fmt(grandTotal)})
      </Btn>
    </div>
  );
}

// ── TRANSACTION DETAIL ────────────────────────────────────────────────────────
function TxDetail({ cx, tx, cb, cfg, nav, pg, uTx, uCb }) {
  const [payAmt,    setPayAmt]    = useState("");
  const [payMethod, setPayMethod] = useState("Nakit");
  const [payNote,   setPayNote]   = useState("");
  const [showWa,    setShowWa]    = useState(false);
  const [closeModal,setCloseModal]= useState(false);
  const [delModal,  setDelModal]  = useState(false);

  const t    = tx.find(t=>t.id===pg.txId);
  const cust = t ? cx.find(c=>c.id===t.customerId) : null;
  if (!t||!cust) return <div className="fin"><Btn onClick={()=>nav("home")} variant="ghost" size="sm">← Geri</Btn><Empty msg="İşlem bulunamadı"/></div>;

  const {total,paid,balance,itemsCount,deliveredCount} = calcTx(t);

  const deliverItem = itemId => {
    const now = new Date().toISOString();
    const upd = tx.map(tt=>tt.id!==t.id?tt:{...tt,items:tt.items.map(i=>i.id!==itemId?i:{...i,delivered:true,deliveredAt:now})});
    const updTx = upd.find(tt=>tt.id===t.id);
    uTx(updTx.items.every(i=>i.delivered) ? upd.map(tt=>tt.id!==t.id?tt:{...tt,status:"closed"}) : upd);
  };

  const addPayment = () => {
    const amt = parseFloat(payAmt);
    if (!amt||amt<=0) { alert("Geçerli bir tutar girin."); return; }
    const pay = {id:uid(),amount:amt,date:new Date().toISOString(),method:payMethod,note:payNote};
    uTx(tx.map(tt=>tt.id!==t.id?tt:{...tt,payments:[...(tt.payments||[]),pay]}));
    uCb([...cb,{id:uid(),date:new Date().toISOString(),type:"in",amount:amt,category:"Tahsilat",description:`${cust.name} — #${t.id.slice(-6).toUpperCase()}${payNote?` • ${payNote}`:""}`}]);
    setPayAmt(""); setPayNote("");
  };

  const waText = `Sayın ${cust.name},\n\nSeren Kuru Temizleme'den bilgilendirme:\n\nİşlem No: #${t.id.slice(-6).toUpperCase()}\nTarih: ${fdate(t.createdAt)}${t.readyDate?`\nHazır Tarihi: ${fdate(t.readyDate)}`:""}\n\nÜrünler: ${itemsCount} (${deliveredCount} teslim edildi)\nToplam: ${fmt(total)}\nÖdenen: ${fmt(paid)}\nKalan: ${fmt(balance)}\n\nİyi günler 🧺\nSeren Kuru Temizleme`;

  return (
    <div className="fin">
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <Btn onClick={()=>nav("cdetail",{cid:cust.id})} variant="ghost" size="sm">← {cust.name}</Btn>
        <Btn onClick={()=>setCloseModal(true)} variant={t.status==="open"?"ghost":"success"} size="sm">{t.status==="open"?"🔒 Kapat":"🔓 Yeniden Aç"}</Btn>
        <Btn onClick={()=>setDelModal(true)} variant="danger" size="sm">🗑 Sil</Btn>
      </div>

      <div style={{background:C.p,borderRadius:14,padding:"18px 20px",marginBottom:14,color:"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:12}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:19}}>İşlem #{t.id.slice(-6).toUpperCase()}</div>
            <div style={{fontSize:12,opacity:0.75,marginTop:2}}>{cust.name} · {fdate(t.createdAt)}</div>
            {t.readyDate && <div style={{fontSize:12,color:"#FAD89A",marginTop:2}}>🕐 Hazır: {fdate(t.readyDate)}</div>}
            {t.notes     && <div style={{fontSize:12,opacity:0.8,marginTop:2}}>📝 {t.notes}</div>}
          </div>
          <Badge color={t.status==="open"?"warn":"success"}>{t.status==="open"?"Açık":"Kapalı"}</Badge>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {[
            {label:"Toplam",v:fmt(total),  bg:"rgba(255,255,255,0.12)"},
            {label:"Ödendi",v:fmt(paid),   bg:"rgba(42,125,90,0.4)"},
            {label:"Kalan", v:fmt(balance),bg:balance>0.01?"rgba(176,48,37,0.45)":"rgba(42,125,90,0.4)"},
            {label:"Teslim",v:`${deliveredCount}/${itemsCount}`,bg:"rgba(255,255,255,0.12)"},
          ].map((s,i)=>(
            <div key={i} style={{background:s.bg,borderRadius:8,padding:"8px 12px"}}>
              <div style={{opacity:0.72,fontSize:11}}>{s.label}</div>
              <div style={{fontWeight:800,fontSize:16}}>{s.v}</div>
            </div>
          ))}
        </div>
      </div>

      <Card title="Ürünler">
        {(t.items||[]).map(it => {
          const lt = (it.qty||0)*(it.unitPrice||0)*(1-(it.discount||0)/100);
          return (
            <div key={it.id} style={{padding:"14px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700}}>{it.prdName||"Ürün"}</span>
                  <Badge color="primary">{it.svcName||"—"}</Badge>
                  {it.delivered ? <Badge color="success">✅ Teslim</Badge> : <Badge color="warn">⏳ Bekliyor</Badge>}
                </div>
                <div style={{color:C.m,fontSize:12}}>
                  {it.qty} adet × {fmt(it.unitPrice)}{it.discount>0?` · %${it.discount} indirim`:""}
                  {it.note?` · 📝 ${it.note}`:""}
                </div>
                {it.delivered&&it.deliveredAt && <div style={{color:C.ok,fontSize:11,marginTop:2}}>{fdate(it.deliveredAt)}</div>}
              </div>
              <div style={{textAlign:"right",minWidth:90}}>
                <div style={{fontWeight:800,color:C.p,fontSize:15,marginBottom:6}}>{fmt(lt)}</div>
                {!it.delivered&&t.status==="open" && <Btn onClick={()=>deliverItem(it.id)} variant="success" size="sm">✓ Teslim Et</Btn>}
              </div>
            </div>
          );
        })}
      </Card>

      {t.status==="open" && (
        <Card title="Ödeme Al">
          <div style={{padding:16}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <Field label="Tutar (₺)">
                <input type="number" min="0" step="0.01" value={payAmt} onChange={e=>setPayAmt(e.target.value)} placeholder={`Kalan: ${fmt(balance)}`}/>
              </Field>
              <Field label="Yöntem">
                <select value={payMethod} onChange={e=>setPayMethod(e.target.value)}>
                  <option>Nakit</option><option>Kredi Kartı</option><option>Banka Transferi</option><option>QR / POS</option>
                </select>
              </Field>
            </div>
            <Field label="Not"><input value={payNote} onChange={e=>setPayNote(e.target.value)} placeholder="Ödeme notu…"/></Field>
            <Btn onClick={addPayment} variant="success" size="lg" style={{width:"100%",justifyContent:"center"}}>💵 Ödeme Ekle</Btn>
          </div>
        </Card>
      )}

      {(t.payments||[]).length>0 && (
        <Card title="Ödeme Geçmişi">
          {t.payments.map(pay=>(
            <div key={pay.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{fontWeight:700,color:C.ok}}>{fmt(pay.amount)}</span>
                <span style={{color:C.m,fontSize:12,marginLeft:8}}>{fdate(pay.date)} · {pay.method||"Nakit"}{pay.note?` · ${pay.note}`:""}</span>
              </div>
              <Btn onClick={()=>uTx(tx.map(tt=>tt.id!==t.id?tt:{...tt,payments:(tt.payments||[]).filter(p=>p.id!==pay.id)}))} variant="ghost" size="sm" style={{color:C.err,border:"none",fontSize:16}}>✕</Btn>
            </div>
          ))}
        </Card>
      )}

      <Card title="WhatsApp / SMS Mesajı">
        <div style={{padding:14}}>
          <Btn onClick={()=>setShowWa(!showWa)} variant="wa">{showWa?"Gizle":"📱 Mesaj Oluştur"}</Btn>
          {showWa && (
            <div style={{marginTop:10}}>
              <textarea value={waText} readOnly rows={10} style={{resize:"none",background:"#F0FBF4",fontSize:13,lineHeight:1.6,marginBottom:8}}/>
              <Btn onClick={()=>navigator.clipboard.writeText(waText).then(()=>alert("Kopyalandı!"))} variant="primary" size="sm">📋 Kopyala</Btn>
            </div>
          )}
        </div>
      </Card>

      <Modal open={closeModal} onClose={()=>setCloseModal(false)} title={t.status==="open"?"İşlemi Kapat":"Yeniden Aç"}>
        <p style={{color:C.m,fontSize:14,marginBottom:18}}>{t.status==="open"?"Tamamlandı olarak işaretlensin mi?":"Yeniden açmak istiyor musunuz?"}</p>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{uTx(tx.map(tt=>tt.id!==t.id?tt:{...tt,status:t.status==="open"?"closed":"open"}));setCloseModal(false);}} variant="accent" style={{flex:1,justifyContent:"center"}}>Evet</Btn>
          <Btn onClick={()=>setCloseModal(false)} variant="ghost" style={{flex:1,justifyContent:"center"}}>İptal</Btn>
        </div>
      </Modal>

      <Modal open={delModal} onClose={()=>setDelModal(false)} title="İşlemi Sil">
        <p style={{color:C.m,fontSize:14,marginBottom:18}}>Bu işlemi kalıcı olarak silmek istiyor musunuz?</p>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{uTx(tx.filter(tt=>tt.id!==t.id));nav("cdetail",{cid:cust.id});}} variant="danger" style={{flex:1,justifyContent:"center"}}>Sil</Btn>
          <Btn onClick={()=>setDelModal(false)} variant="ghost" style={{flex:1,justifyContent:"center"}}>İptal</Btn>
        </div>
      </Modal>
    </div>
  );
}

// ── CASH ──────────────────────────────────────────────────────────────────────
function Cash({ cb, uCb }) {
  const CATS_IN  = ["Tahsilat","Diğer Gelir","Avans","Bozuk Para"];
  const CATS_OUT = ["Kira","Personel Maaşı","Malzeme / Kimyasal","Elektrik","Su","Fatura","Kargo","Diğer Gider"];
  const [form,   setForm]   = useState({type:"in",amount:"",category:"Tahsilat",description:"",date:today()});
  const [filter, setFilter] = useState("all");
  const [monthF, setMonthF] = useState(new Date().toISOString().slice(0,7));
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const save = () => {
    if (!form.amount||!form.description.trim()) { alert("Tutar ve açıklama zorunludur."); return; }
    uCb([...cb,{id:uid(),...form,amount:parseFloat(form.amount),createdAt:new Date().toISOString()}]);
    setForm(f=>({...f,amount:"",description:""}));
  };
  const filtered = cb.filter(e=>filter==="all"||e.type===filter).filter(e=>e.date && e.date.startsWith(monthF)).sort((a,b)=>b.date.localeCompare(a.date));
  const totalIn  = filtered.filter(e=>e.type==="in").reduce((s,e)=>s+e.amount,0);
  const totalOut = filtered.filter(e=>e.type==="out").reduce((s,e)=>s+e.amount,0);
  return (
    <div className="fin">
      <h2 style={{fontFamily:"'Playfair Display',serif",color:C.p,fontSize:20,marginBottom:16}}>Kasa Defteri</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
        <div style={{background:C.okb,borderRadius:10,padding:"12px 14px"}}>
          <div style={{color:C.m,fontSize:11}}>Toplam Giriş</div>
          <div style={{fontWeight:800,fontSize:17,color:C.ok}}>{fmt(totalIn)}</div>
        </div>
        <div style={{background:C.errb,borderRadius:10,padding:"12px 14px"}}>
          <div style={{color:C.m,fontSize:11}}>Toplam Çıkış</div>
          <div style={{fontWeight:800,fontSize:17,color:C.err}}>{fmt(totalOut)}</div>
        </div>
        <div style={{background:totalIn-totalOut>=0?C.okb:C.errb,borderRadius:10,padding:"12px 14px"}}>
          <div style={{color:C.m,fontSize:11}}>Net Bakiye</div>
          <div style={{fontWeight:800,fontSize:17,color:totalIn-totalOut>=0?C.ok:C.err}}>{fmt(totalIn-totalOut)}</div>
        </div>
      </div>
      <Card title="Yeni Kayıt">
        <div style={{padding:16}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <Field label="Tür">
              <select value={form.type} onChange={e=>{set("type",e.target.value);set("category",e.target.value==="in"?"Tahsilat":"Kira");}}>
                <option value="in">💚 Giriş (Gelir)</option>
                <option value="out">🔴 Çıkış (Gider)</option>
              </select>
            </Field>
            <Field label="Kategori">
              <select value={form.category} onChange={e=>set("category",e.target.value)}>
                {(form.type==="in"?CATS_IN:CATS_OUT).map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <Field label="Tutar (₺)"><input type="number" min="0" step="0.01" value={form.amount} onChange={e=>set("amount",e.target.value)} placeholder="0.00"/></Field>
            <Field label="Tarih">    <input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
          </div>
          <Field label="Açıklama *"><input value={form.description} onChange={e=>set("description",e.target.value)} placeholder="Ödeme veya gider açıklaması…"/></Field>
          <Btn onClick={save} variant={form.type==="in"?"success":"danger"} size="lg" style={{width:"100%",justifyContent:"center"}}>{form.type==="in"?"+ Gelir Ekle":"− Gider Ekle"}</Btn>
        </div>
      </Card>
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4}}>
          {[["all","Tümü"],["in","Gelir"],["out","Gider"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${filter===k?C.p:C.b}`,background:filter===k?C.p:"transparent",color:filter===k?"#fff":C.t,fontWeight:600,fontSize:13,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        <input type="month" value={monthF} onChange={e=>setMonthF(e.target.value)} style={{width:"auto",padding:"5px 10px"}}/>
      </div>
      <Card>
        {filtered.length===0 ? <Empty/> : filtered.map(e=>(
          <div key={e.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                <span style={{fontWeight:700,color:e.type==="in"?C.ok:C.err}}>{e.type==="in"?"+":"-"}{fmt(e.amount)}</span>
                <Badge color={e.type==="in"?"success":"danger"}>{e.category}</Badge>
              </div>
              <div style={{color:C.m,fontSize:12}}>{fdate(e.date)} · {e.description}</div>
            </div>
            <Btn onClick={()=>uCb(cb.filter(x=>x.id!==e.id))} variant="ghost" size="sm" style={{color:C.err,border:"none"}}>✕</Btn>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ── REPORTS ───────────────────────────────────────────────────────────────────
function Reports({ cx, tx, nav }) {
  const [rtype, setRtype] = useState("income");
  const [month, setMonth] = useState(new Date().toISOString().slice(0,7));

  const payRows = useMemo(()=>{
    const rows=[];
    tx.forEach(t=>{
      const cust=cx.find(c=>c.id===t.customerId);
      (t.payments||[]).forEach(p=>{
        if(!(p.date && p.date.startsWith(month))) return;
        rows.push({date:p.date.slice(0,10),amount:p.amount,customer:(cust && cust.name)||"?",method:p.method||"Nakit"});
      });
    });
    return rows.sort((a,b)=>b.date.localeCompare(a.date));
  },[tx,cx,month]);

  const totalIncome = payRows.reduce((s,r)=>s+r.amount,0);
  const byDay = useMemo(()=>{
    const m={};
    payRows.forEach(r=>{m[r.date]=(m[r.date]||0)+r.amount;});
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
  },[payRows]);

  const phoneList = [...cx].sort((a,b)=>a.name.localeCompare(b.name,"tr"));
  const copyPhones = () => navigator.clipboard.writeText(phoneList.map(c=>`${c.name}\t${c.phone}${c.address?`\t${c.address}`:""}`).join("\n")).then(()=>alert(`${phoneList.length} müşteri kopyalandı!`));

  const readyTxs = useMemo(()=>tx.filter(t=>t.readyDate&&t.status==="open").map(t=>{
    const cust=cx.find(c=>c.id===t.customerId);
    const{balance,deliveredCount,itemsCount}=calcTx(t);
    const daysLeft=Math.ceil((new Date(t.readyDate)-new Date(today()))/(86400000));
    return{...t,cust,balance,deliveredCount,itemsCount,daysLeft};
  }).sort((a,b)=>new Date(a.readyDate)-new Date(b.readyDate)),[tx,cx]);

  return (
    <div className="fin">
      <h2 style={{fontFamily:"'Playfair Display',serif",color:C.p,fontSize:20,marginBottom:16}}>Raporlar</h2>
      <div style={{display:"flex",gap:2,marginBottom:16,background:"#E8E2D9",borderRadius:10,padding:3}}>
        {[["income","📈 Gelir"],["phones","📞 Telefonlar"],["ready","🕐 Hazır Bildirim"]].map(([k,l])=>(
          <button key={k} onClick={()=>setRtype(k)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",background:rtype===k?C.s:"transparent",color:rtype===k?C.p:C.m,fontWeight:700,fontSize:13,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {rtype==="income" && (
        <div>
          <div style={{marginBottom:14,maxWidth:200}}>
            <Field label="Ay"><input type="month" value={month} onChange={e=>setMonth(e.target.value)}/></Field>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
            <div style={{background:C.okb,borderRadius:10,padding:"14px 16px"}}>
              <div style={{color:C.m,fontSize:11}}>Aylık Tahsilat</div>
              <div style={{fontWeight:800,fontSize:19,color:C.ok}}>{fmt(totalIncome)}</div>
              <div style={{color:C.m,fontSize:11}}>{payRows.length} ödeme</div>
            </div>
            <div style={{background:"#E8EFF7",borderRadius:10,padding:"14px 16px"}}>
              <div style={{color:C.m,fontSize:11}}>Toplam Alacak</div>
              <div style={{fontWeight:800,fontSize:19,color:C.p}}>{fmt(tx.reduce((s,t)=>{const{balance}=calcTx(t);return s+(balance>0?balance:0);},0))}</div>
            </div>
            <div style={{background:"#F0EBE3",borderRadius:10,padding:"14px 16px"}}>
              <div style={{color:C.m,fontSize:11}}>Açık İşlem</div>
              <div style={{fontWeight:800,fontSize:19,color:C.warn}}>{tx.filter(t=>t.status==="open").length}</div>
            </div>
          </div>
          {byDay.length>0 && (
            <Card title="Günlük Döküm" style={{marginBottom:14}}>
              {byDay.map(([d,amt])=>(
                <div key={d} style={{padding:"9px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",fontSize:13}}>
                  <span style={{color:C.m}}>{fdate(d)}</span>
                  <span style={{fontWeight:700,color:C.ok}}>{fmt(amt)}</span>
                </div>
              ))}
              <div style={{padding:"10px 16px",display:"flex",justifyContent:"space-between",fontWeight:800,background:"#FAFAF8"}}>
                <span>Toplam</span><span style={{color:C.ok}}>{fmt(totalIncome)}</span>
              </div>
            </Card>
          )}
          <Card title="Ödeme Detayları">
            {payRows.length===0 ? <Empty msg="Bu ayda ödeme yok."/> : payRows.map((r,i)=>(
              <div key={i} style={{padding:"10px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",fontSize:13}}>
                <div>
                  <span style={{fontWeight:700}}>{r.customer}</span>
                  <span style={{color:C.m,fontSize:12,marginLeft:8}}>{fdate(r.date)} · {r.method}</span>
                </div>
                <span style={{fontWeight:700,color:C.ok}}>{fmt(r.amount)}</span>
              </div>
            ))}
          </Card>
        </div>
      )}

      {rtype==="phones" && (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{color:C.m,fontSize:13}}>{phoneList.length} müşteri</span>
            <Btn onClick={copyPhones} variant="accent" size="sm">📋 Excel'e Kopyala</Btn>
          </div>
          <Card>
            {phoneList.length===0 ? <Empty msg="Kayıtlı müşteri yok."/> : phoneList.map(c=>(
              <div key={c.id} style={{padding:"10px 16px",borderBottom:`1px solid ${C.b}`,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}>
                <div>
                  <div style={{fontWeight:700}}>{c.name}</div>
                  {c.address&&<div style={{color:C.m,fontSize:12}}>📍 {c.address}</div>}
                </div>
                <span style={{fontWeight:600,color:C.p}}>{c.phone}</span>
              </div>
            ))}
          </Card>
        </div>
      )}

      {rtype==="ready" && (
        <div>
          <p style={{color:C.m,fontSize:13,marginBottom:12}}>Hazır tarihi tanımlı açık işlemler:</p>
          <Card>
            {readyTxs.length===0 ? <Empty msg="Hazır tarihi tanımlı açık işlem yok."/> : readyTxs.map(t=>(
              <div key={t.id} className="hrow" onClick={()=>nav("txdetail",{txId:t.id})} style={{padding:"14px 16px",borderBottom:`1px solid ${C.b}`}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontWeight:700}}>{(t.cust && t.cust.name) || "?"}</div>
                    <div style={{color:C.m,fontSize:12}}>{(t.cust && t.cust.phone) || ""} · #{t.id.slice(-6).toUpperCase()}</div>
                  </div>
                  <Badge color={t.daysLeft<0?"danger":t.daysLeft<=1?"warn":"success"}>
                    {t.daysLeft<0?`${Math.abs(t.daysLeft)} gün gecikti`:t.daysLeft===0?"Bugün":t.daysLeft===1?"Yarın":`${t.daysLeft} gün kaldı`}
                  </Badge>
                </div>
                <div style={{color:C.m,fontSize:12,marginTop:6}}>🕐 {fdate(t.readyDate)} · {t.deliveredCount}/{t.itemsCount} teslim · Kalan: {fmt(t.balance)}</div>
              </div>
            ))}
          </Card>
        </div>
      )}
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function Settings({ cfg, uCfg, onExport, onImport, authUser, onLogout }) {
  const [tab,       setTab]       = useState("svc");
  const [selSvcId,  setSelSvcId]  = useState((cfg.svc[0] && cfg.svc[0].id)||"");
  const [newSvcName,setNewSvcName]= useState("");
  const [newPrd,    setNewPrd]    = useState({name:"",price:""});
  const [editPrd,   setEditPrd]   = useState(null);
  const [editSvc,   setEditSvc]   = useState(null);
  const [gsInput,   setGsInput]   = useState(getGsUrl());
  const [gsTest,    setGsTest]    = useState(null); // null | "testing" | "ok" | "error"
  const isAdmin = authUser && ["admin","ADMIN"].includes(String(authUser.role));

  const selSvc = cfg.svc.find(s=>s.id===selSvcId) || cfg.svc[0];
  const users  = cfg.users || DEFAULT_USERS;
  const uUsers = newUsers => uCfg({...cfg, users:newUsers});

  const addSvc = () => {
    if (!newSvcName.trim()) return;
    const ns = {id:uid(), name:newSvcName.trim(), items:[]};
    uCfg({...cfg, svc:[...cfg.svc, ns]});
    setSelSvcId(ns.id);
    setNewSvcName("");
  };

  const delSvc = (svcId) => {
    if (!window.confirm("Bu hizmet türünü silmek istiyor musunuz?")) return;
    const next = cfg.svc.filter(s=>s.id!==svcId);
    uCfg({...cfg, svc:next});
    setSelSvcId((next[0] && next[0].id)||"");
  };

  const addPrd = () => {
    if (!newPrd.name.trim()) { alert("Ürün adı zorunludur."); return; }
    uCfg({...cfg, svc:cfg.svc.map(s=>s.id!==selSvc.id ? s : {...s, items:[...s.items, {id:uid(), name:newPrd.name.trim(), price:parseFloat(newPrd.price)||0}]})});
    setNewPrd({name:"",price:""});
  };

  const delPrd = (svcId, prdId) => {
    uCfg({...cfg, svc:cfg.svc.map(s=>s.id!==svcId ? s : {...s, items:s.items.filter(p=>p.id!==prdId)})});
  };

  const saveEditPrd = () => {
    uCfg({...cfg, svc:cfg.svc.map(s=>s.id!==editPrd.svcId ? s : {...s, items:s.items.map(p=>p.id!==editPrd.id ? p : {...p, name:editPrd.name, price:parseFloat(editPrd.price)||0})})});
    setEditPrd(null);
  };

  const saveEditSvc = () => {
    uCfg({...cfg, svc:cfg.svc.map(s=>s.id!==editSvc.id ? s : {...s, name:editSvc.name})});
    setEditSvc(null);
  };

  return (
    <div className="fin">
      <h2 style={{fontFamily:"'Playfair Display',serif", color:C.p, fontSize:20, marginBottom:16}}>Ayarlar</h2>

      <div style={{background:C.okb, border:`1.5px solid ${C.ok}`, borderRadius:12, padding:"12px 16px", marginBottom:14}}>
        <div style={{fontWeight:700, color:C.ok, marginBottom:3}}>✅ Google Sheets Bağlı</div>
        <div style={{color:C.m, fontSize:12, wordBreak:"break-all"}}>{getGsUrl()}</div>
      </div>

      <div style={{display:"flex", gap:2, marginBottom:16, background:"#E8E2D9", borderRadius:10, padding:3}}>
        {[["svc","🧺 Hizmetler"],["users","👥 Kullanıcılar"],["gs","🔗 Sheets"],["backup","💾 Yedek"]].map(([k,l]) => (
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1, padding:"8px 4px", borderRadius:8, border:"none", background:tab===k?C.s:"transparent", color:tab===k?C.p:C.m, fontWeight:700, fontSize:12, cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {tab === "svc" && (
        <div>
          <Card title="Hizmet Türleri ve Ürünleri">
            <div style={{padding:"12px 16px", borderBottom:`1px solid ${C.b}`, display:"flex", gap:8, flexWrap:"wrap", alignItems:"center"}}>
              <select value={selSvcId} onChange={e=>setSelSvcId(e.target.value)} style={{flex:1, minWidth:160}}>
                {cfg.svc.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
              {selSvc && (
                <div style={{display:"flex", gap:6}}>
                  <Btn onClick={()=>setEditSvc({id:selSvc.id, name:selSvc.name})} variant="ghost" size="sm">✏️ Düzenle</Btn>
                  <Btn onClick={()=>delSvc(selSvc.id)} variant="danger" size="sm">🗑</Btn>
                </div>
              )}
            </div>

            <div style={{padding:"10px 16px", borderBottom:`1px solid ${C.b}`, display:"flex", gap:8, background:"#FAFAF8"}}>
              <input value={newSvcName} onChange={e=>setNewSvcName(e.target.value)}
                placeholder="Yeni hizmet türü adı…" onKeyDown={e=>e.key==="Enter"&&addSvc()} style={{flex:1}}/>
              <Btn onClick={addSvc} variant="success" size="sm">+ Hizmet Ekle</Btn>
            </div>

            {selSvc && (
              <div>
                <div style={{padding:"8px 16px", background:"#E8EFF7"}}>
                  <span style={{fontWeight:700, color:C.p, fontSize:13}}>📦 {selSvc.name} — Ürün Listesi</span>
                </div>
                {(selSvc.items||[]).length === 0
                  ? <Empty msg="Bu hizmete henüz ürün eklenmedi." />
                  : (selSvc.items||[]).map(prd => (
                      <div key={prd.id} style={{padding:"10px 16px", borderBottom:`1px solid ${C.b}`, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                        <div>
                          <span style={{fontWeight:600}}>{prd.name}</span>
                          <span style={{color:C.a, fontWeight:700, fontSize:13, marginLeft:10}}>{fmt(prd.price)}</span>
                        </div>
                        <div style={{display:"flex", gap:6}}>
                          <Btn onClick={()=>setEditPrd({svcId:selSvc.id, id:prd.id, name:prd.name, price:prd.price.toString()})} variant="ghost" size="sm">✏️</Btn>
                          <Btn onClick={()=>delPrd(selSvc.id, prd.id)} variant="danger" size="sm">Sil</Btn>
                        </div>
                      </div>
                    ))
                }
                <div style={{padding:14}}>
                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8}}>
                    <input value={newPrd.name}  onChange={e=>setNewPrd(f=>({...f,name:e.target.value}))}  placeholder="Ürün adı…"/>
                    <input value={newPrd.price} onChange={e=>setNewPrd(f=>({...f,price:e.target.value}))} placeholder="Fiyat ₺" type="number" min="0"/>
                  </div>
                  <Btn onClick={addPrd} variant="success" style={{width:"100%", justifyContent:"center"}}>+ Ürün Ekle</Btn>
                </div>
              </div>
            )}
          </Card>

          <Modal open={!!editSvc} onClose={()=>setEditSvc(null)} title="Hizmet Türünü Düzenle">
            {editSvc && (
              <div>
                <Field label="Hizmet Adı">
                  <input value={editSvc.name} onChange={e=>setEditSvc(s=>({...s,name:e.target.value}))} placeholder="Hizmet adı"/>
                </Field>
                <div style={{display:"flex", gap:10}}>
                  <Btn onClick={saveEditSvc} variant="accent" style={{flex:1, justifyContent:"center"}}>Kaydet</Btn>
                  <Btn onClick={()=>setEditSvc(null)} variant="ghost" style={{flex:1, justifyContent:"center"}}>İptal</Btn>
                </div>
              </div>
            )}
          </Modal>

          <Modal open={!!editPrd} onClose={()=>setEditPrd(null)} title="Ürünü Düzenle">
            {editPrd && (
              <div>
                <Field label="Ürün Adı">
                  <input value={editPrd.name} onChange={e=>setEditPrd(p=>({...p,name:e.target.value}))} placeholder="Ürün adı"/>
                </Field>
                <Field label="Fiyat (₺)">
                  <input type="number" value={editPrd.price} onChange={e=>setEditPrd(p=>({...p,price:e.target.value}))} placeholder="0.00"/>
                </Field>
                <div style={{display:"flex", gap:10}}>
                  <Btn onClick={saveEditPrd} variant="accent" style={{flex:1, justifyContent:"center"}}>Kaydet</Btn>
                  <Btn onClick={()=>setEditPrd(null)} variant="ghost" style={{flex:1, justifyContent:"center"}}>İptal</Btn>
                </div>
              </div>
            )}
          </Modal>
        </div>
      )}

      {tab === "users" && (
        <SettingsUsers users={users} authUser={authUser} uUsers={uUsers} onLogout={onLogout}/>
      )}

      {tab === "gs" && (
        <div>
          <Card title="Google Sheets Bağlantısı">
            <div style={{padding:20}}>
              <Field label="Apps Script URL">
                <input
                  value={gsInput}
                  onChange={e=>{setGsInput(e.target.value);setGsTest(null);}}
                  placeholder="https://script.google.com/macros/s/…/exec"
                  style={{fontFamily:"monospace",fontSize:12}}
                  disabled={!isAdmin}
                />
              </Field>
              <div style={{color:C.m,fontSize:12,marginBottom:14}}>
                Google Apps Script → Dağıt → Web uygulaması olarak dağıt → URL'yi kopyalayıp yapıştırın.
              </div>
              {gsTest==="ok"      && <div style={{color:C.ok,fontWeight:700,marginBottom:10}}>✅ Bağlantı başarılı.</div>}
              {gsTest==="error"   && <div style={{color:C.err,fontWeight:700,marginBottom:10}}>❌ Bağlantı kurulamadı. URL'yi kontrol edin.</div>}
              {gsTest==="testing" && <div style={{color:C.m,fontSize:13,marginBottom:10}}>⏳ Test ediliyor…</div>}
              {isAdmin ? (
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <Btn onClick={async()=>{
                    const url = gsInput.trim();
                    if (!url) return;
                    setGsTest("testing");
                    try {
                      const r = await fetch(url, {signal:AbortSignal.timeout(8000)});
                      await r.text();
                      setGsTest(r.ok ? "ok" : "error");
                    } catch { setGsTest("error"); }
                  }} variant="ghost" size="sm" disabled={!gsInput.trim()||gsTest==="testing"}>
                    🔌 Bağlantıyı Test Et
                  </Btn>
                  <Btn onClick={()=>{
                    const url = gsInput.trim();
                    if (!url) { alert("URL boş olamaz."); return; }
                    setGsUrl(url);
                    alert("✅ Kaydedildi. Değişikliğin aktif olması için çıkış yapıp tekrar giriş yapın.");
                  }} variant="accent" size="sm">
                    💾 Kaydet
                  </Btn>
                  {gsInput !== DEFAULT_GS_URL && (
                    <Btn onClick={()=>{setGsInput(DEFAULT_GS_URL);setGsTest(null);}} variant="ghost" size="sm">
                      ↩ Varsayılana Dön
                    </Btn>
                  )}
                </div>
              ) : (
                <p style={{color:C.m,fontSize:12}}>URL değiştirmek için admin yetkisi gerekir.</p>
              )}
            </div>
          </Card>
        </div>
      )}

      {tab === "backup" && (
        <div style={{background:"#FEF0E4", border:`1.5px solid ${C.warn}`, borderRadius:12, padding:16}}>
          <div style={{fontWeight:700, color:C.warn, marginBottom:6}}>💾 Yerel Yedek</div>
          <div style={{color:"#7A3B00", fontSize:13, marginBottom:12}}>Google Sheets'e ek olarak bilgisayarınıza yedek alabilirsiniz.</div>
          <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
            <Btn onClick={onExport} variant="accent">💾 Yedek Al (.json)</Btn>
            <label style={{display:"inline-flex", alignItems:"center", gap:6, background:C.p, color:"#fff", padding:"8px 16px", borderRadius:8, fontWeight:700, fontSize:14, cursor:"pointer"}}>
              📂 Yedek Yükle
              <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onImport(e.target.files[0]);e.target.value="";}}/>
            </label>
          </div>
        </div>
      )}
    </div>
  );
}


// ── SETTINGS USERS ────────────────────────────────────────────────────────────

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
